<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Triple Tile - Neko Match</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: linear-gradient(135deg, #1a1a2e, #16213e); 
  min-height: 100vh; 
  display: flex; 
  justify-content: center; 
  align-items: center;
  font-family: Arial, sans-serif;
}
#landing, #game {
  width: 360px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
#landing {
  background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 100%);
  position: relative;
  overflow: hidden;
}
.cherry {
  position: absolute;
  font-size: 28px;
  opacity: 0.6;
  animation: float 3s ease-in-out infinite;
}
.cherry:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
.cherry:nth-child(2) { top: 20%; right: 15%; animation-delay: 0.5s; }
.cherry:nth-child(3) { bottom: 30%; left: 8%; animation-delay: 1s; }
.cherry:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 1.5s; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(10deg); }
}
.cat-container { margin-top: 40px; margin-bottom: 20px; }
.cat-body {
  width: 160px; height: 140px;
  background: #1a1a1a;
  border-radius: 50% 50% 45% 45%;
  position: relative; margin: 0 auto;
  animation: catBounce 2s ease-in-out infinite;
}
@keyframes catBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.cat-head {
  width: 130px; height: 110px;
  background: #1a1a1a;
  border-radius: 50%;
  position: absolute; top: -30px; left: 50%;
  transform: translateX(-50%);
}
.cat-ear { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #1a1a1a; position: absolute; top: -15px; }
.cat-ear.left { left: 8px; transform: rotate(-15deg); }
.cat-ear.right { right: 8px; transform: rotate(15deg); }
.cat-ear-inner { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 18px solid #ffb6c1; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); }
.cat-eyes { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 28px; }
.cat-eye { width: 22px; height: 28px; background: #ffd700; border-radius: 50%; position: relative; animation: catBlink 4s ease-in-out infinite; }
.cat-eye::after { content: ''; width: 10px; height: 14px; background: #1a1a1a; border-radius: 50%; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); }
@keyframes catBlink { 0%, 45%, 55%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
.cat-nose { width: 14px; height: 10px; background: #ff6b9d; border-radius: 50% 50% 40% 40%; position: absolute; top: 70px; left: 50%; transform: translateX(-50%); }
.cat-mouth { position: absolute; top: 78px; left: 50%; transform: translateX(-50%); width: 30px; height: 15px; border-bottom: 3px solid #555; border-left: 3px solid #555; border-right: 3px solid #555; border-radius: 0 0 50% 50%; }
.whisker { position: absolute; top: 68px; width: 35px; height: 2px; background: #555; }
.whisker.left { left: -25px; transform: rotate(-10deg); }
.whisker.right { right: -25px; transform: rotate(10deg); }
.cat-belly { width: 90px; height: 50px; background: #2d2d2d; border-radius: 50%; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); }
.cat-title { font-size: 28px; font-weight: bold; color: #ff6b6b; text-shadow: 0 2px 10px rgba(0,0,0,0.2); margin-bottom: 5px; }
.cat-subtitle { font-size: 14px; color: #888; margin-bottom: 30px; }
.diff-label { color: #555; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
.diff-btn { width: 200px; padding: 14px; margin: 6px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.diff-btn:hover { transform: scale(1.05); }
.diff-btn.easy { background: linear-gradient(135deg, #55efc4, #00b894); color: white; }
.diff-btn.normal { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #555; }
.diff-btn.hard { background: linear-gradient(135deg, #ff6b6b, #d63031); color: white; }
#game { background: linear-gradient(180deg, #1e3a5f, #152238); display: none; padding: 10px; }
#game.show { display: flex; }
.game-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; }
.header-btn { width: 40px; height: 40px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; background: rgba(255,255,255,0.1); color: white; }
#tilesLeft { color: #ffd700; font-size: 16px; font-weight: bold; }
#board {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px;
  padding: 8px;
  flex: 1;
}
.tile {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, opacity 0.15s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4);
}
.tile:active { transform: scale(0.92); }
.tile.hidden { visibility: hidden; pointer-events: none; }
.tile.hint-glow { box-shadow: 0 0 0 4px #ffd700, 0 0 20px #ffd700; }
.type-0 { background: linear-gradient(135deg, #74b9ff, #0984e3); }
.type-1 { background: linear-gradient(135deg, #ff6b6b, #d63031); }
.type-2 { background: linear-gradient(135deg, #55efc4, #00b894); }
.type-3 { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); }
.type-4 { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
.type-5 { background: linear-gradient(135deg, #fd79a8, #e84393); }
.type-6 { background: linear-gradient(135deg, #fdcb6e, #e17055); }
.type-7 { background: linear-gradient(135deg, #81ecec, #00cec9); }
#slots { display: flex; gap: 5px; padding: 10px 5px; background: rgba(0,0,0,0.4); border-radius: 12px; margin: 5px 0; width: 100%; justify-content: center; }
.slot { width: 44px; height: 44px; border-radius: 10px; background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; font-size: 28px; }
.slot.filled { border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); }
.slot.warning { border-color: #ff6b6b; animation: slotWarn 0.5s ease infinite; }
@keyframes slotWarn { 0%, 100% { border-color: #ff6b6b; } 50% { border-color: #ff6b6b66; } }
#powers { display: flex; gap: 10px; width: 100%; justify-content: center; padding: 8px 0; }
.power-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: transform 0.2s; }
.power-btn:hover { transform: scale(1.03); }
.power-btn.undo { background: linear-gradient(135deg, #55efc4, #00b894); color: white; }
.power-btn.hint { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #555; }
.power-btn.shuffle { background: linear-gradient(135deg, #74b9ff, #0984e3); color: white; }
.power-icon { font-size: 20px; }
.power-count { font-size: 11px; opacity: 0.8; }
#neko { text-align: center; padding: 8px 0; width: 100%; }
#nekoMsg { display: inline-block; background: #ff6b9d; color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; position: relative; animation: msgPop 0.3s ease; }
#nekoMsg::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 8px solid #ff6b9d; }
@keyframes msgPop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
.neko-mini { width: 50px; height: 50px; margin: 0 auto 5px; }
#modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 200; }
#modal.show { display: flex; }
.modal-box { background: white; border-radius: 20px; padding: 30px; text-align: center; min-width: 280px; animation: modalIn 0.3s ease; }
@keyframes modalIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.modal-box h2 { font-size: 26px; margin-bottom: 10px; }
.modal-box p { color: #888; margin-bottom: 20px; font-size: 14px; }
.modal-btn { padding: 12px 30px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin: 5px; }
.modal-btn.retry { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
.modal-btn.home { background: linear-gradient(135deg, #74b9ff, #0984e3); }
</style>
</head>
<body>
<div id="landing">
  <div class="cherry">🌸</div>
  <div class="cherry">🌸</div>
  <div class="cherry">🌸</div>
  <div class="cherry">🌿</div>
  <div class="cherry">🌸</div>
  <div class="cherry">🌿</div>
  <div class="cat-container">
    <div class="cat-body">
      <div class="cat-head">
        <div class="cat-ear left"><div class="cat-ear-inner"></div></div>
        <div class="cat-ear right"><div class="cat-ear-inner"></div></div>
        <div class="cat-eyes"><div class="cat-eye"></div><div class="cat-eye"></div></div>
        <div class="cat-nose"></div>
        <div class="cat-mouth"></div>
        <div class="whisker left"></div>
        <div class="whisker right"></div>
      </div>
      <div class="cat-belly"></div>
    </div>
  </div>
  <div class="cat-title">Neko Match</div>
  <div class="cat-subtitle">Match 3 tiles to clear!</div>
  <div class="diff-label">Select Difficulty</div>
  <button class="diff-btn easy" onclick="startGame('easy')">Easy · 4 Types</button>
  <button class="diff-btn normal" onclick="startGame('normal')">Normal · 6 Types</button>
  <button class="diff-btn hard" onclick="startGame('hard')">Hard · 8 Types</button>
</div>
<div id="game">
  <div class="game-header">
    <button class="header-btn" onclick="goHome()">🏠</button>
    <div id="tilesLeft">Tiles: 0</div>
    <button class="header-btn" onclick="restartGame()">🔄</button>
  </div>
  <div id="board"></div>
  <div id="slots">
    <div class="slot" id="slot0"></div>
    <div class="slot" id="slot1"></div>
    <div class="slot" id="slot2"></div>
    <div class="slot" id="slot3"></div>
    <div class="slot" id="slot4"></div>
    <div class="slot" id="slot5"></div>
    <div class="slot" id="slot6"></div>
    <div class="slot" id="slot7"></div>
  </div>
  <div id="powers">
    <button class="power-btn undo" onclick="doUndo()">
      <span class="power-icon">↩</span><span>Undo</span><span class="power-count" id="undoCount">3/3</span>
    </button>
    <button class="power-btn hint" onclick="doHint()">
      <span class="power-icon">💡</span><span>Hint</span><span class="power-count" id="hintCount">3/3</span>
    </button>
    <button class="power-btn shuffle" onclick="doShuffle()">
      <span class="power-icon">🔀</span><span>Shuffle</span><span class="power-count" id="shuffleCount">3/3</span>
    </button>
  </div>
  <div id="neko">
    <div class="cat-body neko-mini">
      <div class="cat-head">
        <div class="cat-ear left"><div class="cat-ear-inner"></div></div>
        <div class="cat-ear right"><div class="cat-ear-inner"></div></div>
        <div class="cat-eyes"><div class="cat-eye"></div><div class="cat-eye"></div></div>
        <div class="cat-nose"></div>
        <div class="cat-mouth"></div>
        <div class="whisker left"></div>
        <div class="whisker right"></div>
      </div>
      <div class="cat-belly"></div>
    </div>
    <div id="nekoMsg">Let's match!</div>
  </div>
</div>
<div id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Game Over</h2>
    <p id="modalText">Slots full!</p>
    <button class="modal-btn retry" onclick="restartGame()">Try Again</button>
    <button class="modal-btn home" onclick="goHome()">Home</button>
  </div>
</div>
<script>
const TILE_ICONS = ['🐟','🍖','🍣','🦐','🍰','🍎','🌸','⭐'];
const DIFFICULTY = { easy: 4, normal: 6, hard: 8 };
const TOTAL_TILES = 24;
const TOTAL_SLOTS = 8;

let difficulty = 'easy';
let numTypes = 4;
let grid = [];
let slots = [];
let undoStack = [];
let powers = { undo: 3, hint: 3, shuffle: 3 };
let hintedTiles = [];
let processing = false;

const boardEl = document.getElementById('board');
const nekoMsgEl = document.getElementById('nekoMsg');

function startGame(diff) {
  difficulty = diff;
  numTypes = DIFFICULTY[diff];
  document.getElementById('landing').style.display = 'none';
  document.getElementById('game').classList.add('show');
  initGame();
}

function goHome() {
  document.getElementById('game').classList.remove('show');
  document.getElementById('landing').style.display = 'flex';
  document.getElementById('modal').classList.remove('show');
}

function restartGame() {
  document.getElementById('modal').classList.remove('show');
  initGame();
}

function initGame() {
  slots = [];
  undoStack = [];
  powers = { undo: 3, hint: 3, shuffle: 3 };
  hintedTiles = [];
  processing = false;
  grid = [];
  for (let i = 0; i < TOTAL_TILES; i++) {
    grid.push({ type: i % numTypes, removed: false });
  }
  for (let i = grid.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [grid[i], grid[j]] = [grid[j], grid[i]];
  }
  updatePowers();
  renderBoard();
  renderSlots();
  updateTilesLeft();
  nekoSay('Match 3 to clear!');
}

function renderBoard() {
  boardEl.innerHTML = '';
  for (let idx = 0; idx < grid.length; idx++) {
    const tile = grid[idx];
    const div = document.createElement('div');
    div.className = 'tile type-' + tile.type;
    div.dataset.idx = idx;
    if (tile.removed) {
      div.classList.add('hidden');
    } else {
      div.textContent = TILE_ICONS[tile.type];
      div.addEventListener('touchend', function(e) {
        e.preventDefault();
        if (processing) return;
        onTileClickIdx(parseInt(this.dataset.idx));
      }, {passive: false});
      div.addEventListener('click', function(e) {
        if (processing) return;
        onTileClickIdx(parseInt(this.dataset.idx));
      });
    }
    boardEl.appendChild(div);
  }
}

function renderSlots() {
  for (let i = 0; i < TOTAL_SLOTS; i++) {
    const slot = document.getElementById('slot' + i);
    slot.innerHTML = '';
    slot.className = 'slot';
    if (i < slots.length) {
      slot.textContent = TILE_ICONS[slots[i]];
      slot.classList.add('filled', 'type-' + slots[i]);
    }
  }
  for (let i = 0; i < TOTAL_SLOTS; i++) {
    const slot = document.getElementById('slot' + i);
    if (i >= 6 && i < slots.length) {
      slot.classList.add('warning');
    } else {
      slot.classList.remove('warning');
    }
  }
}

function updateTilesLeft() {
  document.getElementById('tilesLeft').textContent = 'Tiles: ' + grid.filter(t => !t.removed).length;
}

function updatePowers() {
  document.getElementById('undoCount').textContent = powers.undo + '/3';
  document.getElementById('hintCount').textContent = powers.hint + '/3';
  document.getElementById('shuffleCount').textContent = powers.shuffle + '/3';
}

function onTileClickIdx(idx) {
  if (processing) return;
  if (grid[idx].removed) return;
  if (slots.length >= TOTAL_SLOTS) return;
  undoStack.push({ slots: [...slots], grid: grid.map(t => ({ ...t })) });
  if (undoStack.length > 10) undoStack.shift();
  slots.push(grid[idx].type);
  grid[idx].removed = true;
  clearHint();
  renderBoard();
  renderSlots();
  updateTilesLeft();
  checkMatch();
}

function checkMatch() {
  const count = {};
  for (const t of slots) count[t] = (count[t] || 0) + 1;
  let matched = null;
  for (const [t, n] of Object.entries(count)) {
    if (n >= 3) { matched = parseInt(t); break; }
  }
  if (matched !== null) {
    processing = true;
    nekoSay('Nice!');
    let removed = 0;
    for (let i = 0; i < slots.length && removed < 3; i++) {
      if (slots[i] === matched) { slots.splice(i, 1); removed++; i--; }
    }
    setTimeout(() => {
      renderSlots();
      processing = false;
      if (slots.length >= TOTAL_SLOTS) {
        checkGameOver();
      } else {
        checkMatch();
      }
    }, 300);
  } else if (slots.length >= TOTAL_SLOTS) {
    checkGameOver();
  } else if (grid.filter(t => !t.removed).length === 0) {
    showWin();
  } else {
    processing = false;
    const msgs = ['Go!', 'Match!', 'You got this!', 'Purrfect!', 'Meow~'];
    nekoSay(msgs[Math.floor(Math.random() * msgs.length)]);
  }
}

function checkGameOver() {
  if (slots.length >= TOTAL_SLOTS) {
    nekoSay('Game Over...');
    setTimeout(() => showModal(false), 500);
  }
}

function showWin() {
  nekoSay('You Win! Meow!');
  setTimeout(() => {
    document.getElementById('modalTitle').textContent = 'You Win!';
    document.getElementById('modalText').textContent = 'All tiles cleared!';
    document.getElementById('modal').classList.add('show');
  }, 500);
}

function showModal(win) {
  document.getElementById('modalTitle').textContent = win ? 'You Win!' : 'Game Over';
  document.getElementById('modalText').textContent = win ? 'All tiles cleared!' : 'Slots full!';
  document.getElementById('modal').classList.add('show');
}

function getAvailableTiles() {
  return grid.map((t, i) => ({ t, i })).filter(x => !x.t.removed).map(x => x.i);
}

function doUndo() {
  if (powers.undo <= 0 || undoStack.length === 0) { nekoSay('No undo!'); return; }
  powers.undo--;
  updatePowers();
  const state = undoStack.pop();
  slots = state.slots;
  grid = state.grid;
  renderBoard();
  renderSlots();
  updateTilesLeft();
  nekoSay('Undo!');
}

function doHint() {
  if (powers.hint <= 0) { nekoSay('No hints!'); return; }
  const avail = getAvailableTiles();
  if (avail.length === 0) return;
  powers.hint--;
  updatePowers();
  clearHint();
  const availTypes = avail.map(i => grid[i].type);
  const count = {};
  for (const t of availTypes) count[t] = (count[t] || 0) + 1;
  let hintType = -1;
  for (const t of slots) { if (count[t]) { hintType = t; break; } }
  if (hintType === -1) {
    for (const [t, n] of Object.entries(count)) { if (n >= 2) { hintType = parseInt(t); break; } }
  }
  if (hintType === -1) hintType = availTypes[0];
  for (const i of avail) {
    if (grid[i].type === hintType) {
      boardEl.children[i].classList.add('hint-glow');
      hintedTiles.push(boardEl.children[i]);
    }
  }
  nekoSay('Try here!');
  setTimeout(clearHint, 2500);
}

function clearHint() {
  hintedTiles.forEach(el => el.classList.remove('hint-glow'));
  hintedTiles = [];
}

function doShuffle() {
  if (powers.shuffle <= 0) { nekoSay('No shuffle!'); return; }
  powers.shuffle--;
  updatePowers();
  autoShuffle();
  nekoSay('Shuffled!');
}

function autoShuffle() {
  const avail = getAvailableTiles();
  const types = avail.map(i => grid[i].type);
  for (let i = types.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [types[i], types[j]] = [types[j], types[i]];
  }
  avail.forEach((idx, i) => grid[idx].type = types[i]);
  renderBoard();
}

function nekoSay(msg) {
  nekoMsgEl.textContent = msg;
  nekoMsgEl.style.animation = 'none';
  nekoMsgEl.offsetHeight;
  nekoMsgEl.style.animation = 'msgPop 0.3s ease';
}
</script>
</body>
</html>
